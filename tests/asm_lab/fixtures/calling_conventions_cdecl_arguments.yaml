          0, 0, 0, 0,
          80, 255, 18, 0,
          37, 16, 64, 0,
          17, 17, 17, 17,
          34, 34, 34, 34,
          51, 51, 51, 51
        ]
      label: stack-frame-window
      notes:
        - 0x0012ff40 contains the return address.
        - 0x0012ff44 contains argument_1.
        - 0x0012ff48 contains argument_2.
        - 0x0012ff4c contains argument_3.
  stack_pointer_register: esp
  instruction_pointer_register: eip
  annotations:
    - The caller already pushed three cdecl arguments before call.
    - The callee frame is already established with EBP as the stable anchor.
