metadata:
  title: Calling Conventions - cdecl Arguments
  summary: Show how a cdecl callee reads stack arguments from positive EBP-relative offsets.
  pedagogical_objective: Teach that the caller pushes arguments before call, the return address sits below them, and the callee accesses arguments through EBP-relative offsets.
  architecture: x86
  tags:
    - calling-conventions
    - cdecl
    - arguments
    - ebp
