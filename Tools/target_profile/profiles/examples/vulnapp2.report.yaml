schema_version: 1

profile:
  type: report

produced_by:
  stage: reporting

produced_from:
  - vulnapp2.candidate.yaml
  - vulnapp2.located.yaml
  - vulnapp2.verified.yaml

provenance:
  candidate:
    path: vulnapp2.candidate.yaml
    sha256: null
  located:
    path: vulnapp2.located.yaml
    sha256: null
  verified:
    path: vulnapp2.verified.yaml
    sha256: null

# ---------------------------------------------------------------------------
# Audit log
# ---------------------------------------------------------------------------
# Append-only chronological record of all validation runs against this target.
# New stage entries are appended; nothing is overwritten. Re-running a stage
# produces a new entry, not a replacement.

stages:

  - stage: address_validation
    started_at: null   # populated by validator at runtime
    completed_at: null
    status: success

    selected_copy_site: vulnapp2.copy.001
    selected_expression: poi(@esp+8)

    attempts:

      - copy_site: vulnapp2.copy.001
        expression: poi(@esp+8)
        result: pass
        magic_found: true
        breakpoint_hits: 1

      - copy_site: vulnapp2.copy.001
        expression: poi(@esp+4)
        result: fail
        reason: magic_not_found
        note: Destination buffer — does not contain magic at function entry.

      - copy_site: vulnapp2.copy.001
        expression: "poi(@esp+8)+0n2080"
        result: fail
        reason: magic_not_found
        note: >
          Offset-from-recv-start form tried speculatively. Fails because
          new payload layout places magic at recv buffer offset 0, not
          at the EIP overwrite offset.

  - stage: transformation_validation
    started_at: null
    completed_at: null
    status: partial

    selected_transformations:
      - vulnapp2.transform.001
      - vulnapp2.transform.002

    unverified_transformations:
      - vulnapp2.transform.003

    attempts:

      - transform_id: vulnapp2.transform.001
        scope:
          type: byte
          value: 0x3B
        operation:
          type: replace
          value: 0x00
        predicted: 0x00
        observed: 0x00
        result: pass

      - transform_id: vulnapp2.transform.002
        scope:
          type: byte
          value: 0x45
        operation:
          type: replace
          value: 0x00
        predicted: 0x00
        observed: 0x00
        result: pass

      - transform_id: vulnapp2.transform.003
        scope:
          type: byte
          value: 0x0D
        operation:
          type: reject
        result: skipped
        reason: >
          0x0D excluded from candidate payload. Mechanism unverified.
          A dedicated run is required to confirm this transformation.
