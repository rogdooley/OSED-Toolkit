schema_version: 1
profile_type: candidate

target:
  executable: vulnserver.exe
  image_base: 0x00400000

analysis:
  generated_by: manual
  generated_at: 2026-06-25
  analyst: null
  tools:
    - IDA Pro

# ---------------------------------------------------------------------------
# Copy sites
# ---------------------------------------------------------------------------

copy_sites:

  - id: vulnserver.lter.copy.001

    facts:
      rva: null
      note: >
        RVA of the strcpy call site inside the LTER handler, or strcpy
        entry in essfunc.dll. Same copy routine and calling convention as
        vulnserver.trun.copy.001; different handler, different filter.

      api:
        name: strcpy
        imported: true
        dll: essfunc.dll

      calling_convention:
        type: cdecl

      copy_semantics:
        type: null_terminated
        note: >
          Copy halts at first null byte. 0x00 is an implicit bad char
          derivable from this field.

      source_argument:
        stack_offset: 8
        note: >
          esp+8 at strcpy entry. Points to recv buffer after the LTER
          transformation loop has run in-place.

      destination_argument:
        stack_offset: 4

    inferences:

      candidate_breakpoint:
        expression: null
        note: Requires IDA analysis. Prefer essfunc+<strcpy_rva>.

      candidate_dump_exprs:

        - expr: poi(@esp+8)
          confidence: 0.95
          rationale:
            - source argument to strcpy
            - points to recv buffer post-transform
            - consistent with vulnapp2 and TRUN models

        - expr: poi(@esp+4)
          confidence: 0.55
          rationale:
            - destination buffer
            - less useful pre-copy

# ---------------------------------------------------------------------------
# Transformation sites
# ---------------------------------------------------------------------------
# LTER's filter loop restricts the recv buffer to a subset of byte values.
# Bytes outside the allowed range are rejected before the copy site is
# reached. The exact boundary requires IDA verification.
#
# The transformation is modeled as a range_filter — describing the code's
# behavior, not enumerating its consequences. A consumer that needs the
# full list of affected bytes derives it from (start, end).
#
# OBSERVATION: "LTER rejects bytes in range 0x80–0xFF."
# CONCLUSION (derived, not stored): bytes 0x80..0xFF are bad chars.

transformation_sites:

  - id: vulnserver.lter.transform.001

    facts:
      rva: null
      note: >
        Filter loop in the LTER handler. Exact RVA requires IDA analysis.
        Observed behavior: bytes in the upper range do not reach copy.001.
        Boundary is likely 0x80 (bit 7 set) but exact range unverified.
      affected_buffer: recv_buffer
      location: pre_copy

      transformation:
        type: range_filter
        range:
          start: 0x80
          end: 0xFF
        action: reject
        note: >
          Exact boundary unverified. Two candidate policies from common
          OSED exercise patterns:
            - all bytes with bit 7 set (0x80–0xFF, 128 values)
            - all bytes outside printable ASCII (0x20–0x7E)
          Use the validator to confirm. Update range.start/end after
          IDA analysis resolves the exact comparison.

# ---------------------------------------------------------------------------
# Protocol
# ---------------------------------------------------------------------------

protocol:
  transport: tcp
  port: 9999
  prefix: "LTER /.:/ "
  prefix_length: 10
  recv_buffer_size: null
  eip_offset: 2003
  note: >
    Same port and prefix structure as TRUN; different command. EIP offset
    assumed identical — both handlers appear to use similarly-sized stack
    frames. Requires verification.

# ---------------------------------------------------------------------------
# Notes
# ---------------------------------------------------------------------------

notes:
  - >
    LTER is the schema stress test for transformation modeling. The filter
    loop rejects an entire byte range, not individual bytes. Modeling this
    as a range_filter (describing the transformation) rather than enumerating
    128 individual byte_reject entries keeps the profile declarative and
    honest about what the code actually does.

  - >
    Bad chars implied by this profile (derivable, not stored):
    0x00 from copy.001 copy_semantics (null_terminated),
    0x80–0xFF from transform.001 (range_filter, ~128 values depending on
    exact boundary).

  - >
    Once IDA confirms the exact filter range and the transform site RVA,
    update transform.001 facts.rva and transformation.range.start/end.
    The validator will then confirm or revise the boundary empirically.
