schema_version: 1
profile_type: candidate

target:
  executable: vulnserver.exe
  image_base: 0x00400000
  note: >
    essfunc.dll is loaded at runtime and contains the vulnerable copy
    routines. Breakpoint expressions should use module-relative notation
    (essfunc+<rva>) rather than hardcoded VAs to survive ASLR variance.

analysis:
  generated_by: manual
  generated_at: 2026-06-25
  analyst: null
  tools:
    - IDA Pro

# ---------------------------------------------------------------------------
# Copy sites
# ---------------------------------------------------------------------------

copy_sites:

  - id: vulnserver.trun.copy.001

    facts:
      rva: null
      note: >
        RVA of the strcpy call site inside the TRUN handler in vulnserver.exe,
        or the strcpy entry point in essfunc.dll. Requires IDA analysis.
        Prefer the essfunc.dll entry point: args are cleanly on the stack in
        cdecl and the pattern is consistent with vulnapp2.copy.001.

      api:
        name: strcpy
        imported: true
        dll: essfunc.dll

      calling_convention:
        type: cdecl

      copy_semantics:
        type: null_terminated
        note: >
          Standard strcpy behavior. Copy halts at first null byte.
          0x00 is an implicit bad char derivable from this field.

      source_argument:
        stack_offset: 8
        note: >
          esp+8 at strcpy entry (src). Points to recv buffer starting
          after protocol prefix "TRUN /.:/ " (10 bytes).

      destination_argument:
        stack_offset: 4
        note: >
          esp+4 at strcpy entry (dst). Stack buffer in TRUN handler frame.

    inferences:

      candidate_breakpoint:
        expression: null
        note: >
          Requires RVA from IDA. Preferred: essfunc+<strcpy_rva>.
          Alternative: vulnserver+<call_site_rva>.

      candidate_dump_exprs:

        - expr: poi(@esp+8)
          confidence: 0.95
          rationale:
            - source argument to strcpy in cdecl
            - points to recv data starting after protocol prefix
            - same pattern as vulnapp2.copy.001

        - expr: poi(@esp+4)
          confidence: 0.60
          rationale:
            - destination buffer
            - less useful pre-copy

# ---------------------------------------------------------------------------
# Transformation sites
# ---------------------------------------------------------------------------
# TRUN has no known byte transformation loops. Recv buffer reaches strcpy
# unmodified. Only implicit bad char is 0x00 (null_terminated copy_semantics
# on copy.001).

transformation_sites: []

# ---------------------------------------------------------------------------
# Protocol
# ---------------------------------------------------------------------------

protocol:
  transport: tcp
  port: 9999
  prefix: "TRUN /.:/ "
  prefix_length: 10
  recv_buffer_size: null
  eip_offset: 2003
  note: >
    Command format: "TRUN /.:/ " followed by payload. EIP offset 2003
    measured from the start of payload bytes (after prefix). Requires
    fuzzing verification.

# ---------------------------------------------------------------------------
# Notes
# ---------------------------------------------------------------------------

notes:
  - >
    TRUN is the simplest Vulnserver exercise. No transformations, no
    filtering, single implied bad char (0x00 from null_terminated copy).
    It exercises the "imported API copy site" path that VulnApp2's custom
    internal routine did not.

  - >
    transformation_sites is intentionally empty. The empty list is a
    meaningful assertion: no in-place transforms occur on the recv buffer
    before copy.001 is reached.

  - >
    Call site RVA and breakpoint expression are left null pending IDA
    analysis. These are the primary fields the IDA frontend will populate.
