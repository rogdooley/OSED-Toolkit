schema_version: 1
profile_type: candidate

target:
  executable: VulnApp2.exe
  image_base: 0x14800000

analysis:
  generated_by: manual
  generated_at: 2026-06-25
  analyst: null
  tools:
    - IDA Pro

# ---------------------------------------------------------------------------
# Copy sites
# ---------------------------------------------------------------------------

copy_sites:

  - id: vulnapp2.copy.001

    facts:
      rva: 0x1000

      api:
        name: custom_strcpy
        imported: false
        note: >
          Internal null-terminated copy routine, not an imported API.
          Iterates source until null byte, copies to destination including
          the terminating null.

      calling_convention:
        type: cdecl_like

      copy_semantics:
        type: null_terminated
        note: >
          Copy halts at the first null byte in the source buffer.
          A null byte at any position in the recv buffer truncates the copy.
          0x00 is therefore an implicit bad char derivable from this field —
          it does not need to be listed in transformation_sites.

      source_argument:
        stack_offset: 8
        note: poi(@esp+8) at function entry points to recv buffer post-transform.

      destination_argument:
        stack_offset: 4
        note: poi(@esp+4) points to the destination stack buffer.

    inferences:

      candidate_breakpoint:
        expression: vulnapp2+0x1000
        note: Function entry, before copy begins. Source buffer intact.

      candidate_dump_exprs:

        - expr: poi(@esp+8)
          confidence: 0.95
          rationale:
            - source argument to copy routine
            - points to recv buffer after in-place transforms
            - confirmed manually: magic bytes visible at this address

        - expr: poi(@esp+4)
          confidence: 0.65
          rationale:
            - destination buffer
            - contains controlled data only after copy completes
            - copy may be truncated at first null

        - expr: poi(@esp+8)+0n2080
          confidence: 0.20
          rationale:
            - displacement past EIP overwrite offset
            - not useful as primary bad-char dump expression

# ---------------------------------------------------------------------------
# Transformation sites
# ---------------------------------------------------------------------------
# In-place modifications to the recv buffer before copy_site is reached.
# Consumers derive the implied bad-char list from these entries; no
# separate known_bad_chars field is needed.

transformation_sites:

  - id: vulnapp2.transform.001

    facts:
      rva: null
      note: >
        Exact RVA not recorded. Loop occurs before call to vulnapp2.copy.001.
        Verified dynamically: 0x3B does not appear at poi(@esp+8) when
        copy_site breakpoint fires with a crafted payload.
      affected_buffer: recv_buffer
      location: pre_copy

      transformation:
        type: byte_replace
        input_byte: 0x3B
        output_byte: 0x00

  - id: vulnapp2.transform.002

    facts:
      rva: null
      note: >
        Exact RVA not recorded. Loop occurs before call to vulnapp2.copy.001.
        Verified dynamically: 0x45 does not appear at poi(@esp+8) when
        copy_site breakpoint fires.
      affected_buffer: recv_buffer
      location: pre_copy

      transformation:
        type: byte_replace
        input_byte: 0x45
        output_byte: 0x00

  - id: vulnapp2.transform.003

    facts:
      rva: null
      note: >
        0x0D (carriage return) does not survive to the copy site.
        Mechanism is unverified — may be rejected by recv handling at the
        protocol layer rather than by an explicit loop in VulnApp2.
        Exact location requires IDA analysis.
      affected_buffer: recv_buffer
      location: unverified

      transformation:
        type: byte_reject
        input_byte: 0x0D
        action: drop

# ---------------------------------------------------------------------------
# Protocol
# ---------------------------------------------------------------------------

protocol:
  transport: tcp
  port: 7002
  prefix: null
  prefix_length: 0
  recv_buffer_size: 2096
  eip_offset: 2080
  note: >
    No application-layer framing. Raw bytes over TCP. VulnApp2 calls recv()
    once; buffer is 0x830 (2096) bytes. EIP overwritten at offset 2080.

# ---------------------------------------------------------------------------
# Notes
# ---------------------------------------------------------------------------

notes:
  - >
    VulnApp2 shows a non-blocking MessageBox on startup. Does not prevent
    recv from accepting connections.

  - >
    All transformation_sites operate before the call to copy.001.
    Transforms are in-place on the recv buffer; the copy routine receives
    already-modified bytes.

  - >
    Implied bad chars (derivable, not stored):
    0x00 from copy.001 copy_semantics (null_terminated),
    0x0D from transform.003 (byte_reject),
    0x3B from transform.001 (byte_replace → 0x00 → implicit null),
    0x45 from transform.002 (byte_replace → 0x00 → implicit null).

  - >
    Payload layout for bad-char analysis: place magic marker at recv buffer
    offset 0, followed by candidate bytes, then filler to eip_offset, then
    magic again to overwrite EIP. Ensures all candidates land within the
    2096-byte recv window.
